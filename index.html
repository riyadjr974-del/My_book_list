<!DOCTYPE html>
<html>

<head>
    <title>My Book List</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        h1{
            color: #333;
        }

        .book{
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        a{
            text-decoration: none;
            color: blue;
            font-size: 20px;
        }

        a:hover{
            color: red;
        }

    </style>

</head>

<body>

    <h1>📚 My Book List</h1>

    <div class="book">
        <a href="https://example.com/book1.pdf" target="_blank">
            Biology Book
        </a>
    </div>

    <div class="book">
        <a href="https://example.com/book2.pdf" target="_blank">
            Chemistry Book
        </a>
    </div>

    <div class="book">
        <a href="https://example.com/book3.pdf" target="_blank">
            Physics Book
        </a>
    </div>

</body>

</html>
